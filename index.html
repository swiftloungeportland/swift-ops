<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Lounge — Wednesday Order</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #f0f0f0;
    --muted: #888899;
    --green: #2ecc71;
    --input-bg: #13131a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .date-line {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
  }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-top: 10px;
    background: var(--border);
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SECTIONS */
  .section {
    margin: 16px 16px 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .section-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .section-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .section-toggle {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s;
  }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  /* ITEMS */
  .section-body { background: var(--surface); }

  .item-row {
    display: grid;
    grid-template-columns: 1fr 90px 72px;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.15s;
  }
  .item-row:last-of-type { border-bottom: none; }
  .item-row.flagged { background: rgba(233,69,96,0.06); }
  .item-row.ok { background: rgba(46,204,113,0.04); }

  .item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .item-par {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .item-par span {
    color: var(--accent);
    font-weight: 500;
  }
  .item-prod {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: #555566;
    margin-top: 1px;
  }

  .count-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px; /* 16px minimum prevents iOS zoom */
    text-align: center;
    padding: 12px 4px;
    width: 100%;
    min-height: 48px; /* touch target minimum */
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  .count-input::-webkit-outer-spin-button,
  .count-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .count-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .count-input.needs-order { border-color: var(--accent); background: rgba(233,69,96,0.1); }
  .count-input.ok { border-color: var(--green); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    margin: 0 auto;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .status-dot.needs-order { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.ok { background: var(--green); }

  .item-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .unit-select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 16px; /* prevents iOS zoom */
    padding: 4px 2px;
    width: 100%;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  .unit-select:focus { outline: none; border-color: var(--accent); }

  /* ADD ITEM BUTTON */
  .add-item-row {
    padding: 10px 14px;
    border-top: 1px dashed var(--border);
    background: var(--surface);
  }
  .add-item-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 14px;
    width: 100%;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .add-item-btn:hover { border-color: var(--accent); color: var(--accent); }

  .custom-item-form {
    display: none;
    gap: 8px;
    flex-direction: column;
    margin-top: 8px;
  }
  .custom-item-form.visible { display: flex; }
  .custom-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; /* prevents iOS zoom */
    padding: 12px;
    width: 100%;
    min-height: 48px;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  .custom-input:focus { outline: none; border-color: var(--accent2); }
  .custom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .save-custom-btn {
    background: var(--accent2);
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px;
    cursor: pointer;
    width: 100%;
  }
  .cancel-custom-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px;
    cursor: pointer;
    width: 100%;
  }
  .custom-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* NOTES */
  .notes-section {
    margin: 16px 16px 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .notes-header {
    background: var(--surface2);
    padding: 12px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
  }
  textarea.notes-input {
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; /* prevents iOS zoom */
    padding: 14px;
    width: 100%;
    min-height: 90px;
    resize: vertical;
    -webkit-appearance: none;
    appearance: none;
  }
  textarea.notes-input:focus { outline: none; }
  textarea.notes-input::placeholder { color: var(--muted); }

  /* SUMMARY BANNER */
  .summary-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 200;
  }
  .summary-counts {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .summary-counts strong {
    color: var(--accent);
    font-size: 16px;
  }
  .compile-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .compile-btn:hover { background: #c73652; transform: translateY(-1px); }
  .compile-btn:disabled { background: var(--border); color: var(--muted); transform: none; cursor: default; }

  /* COMPILED OUTPUT */
  .output-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 300;
    overflow-y: auto;
    padding: 20px;
  }
  .output-modal.visible { display: block; }
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 600px;
    margin: 0 auto;
    overflow: hidden;
  }
  .output-card-header {
    background: var(--accent);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .output-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: white;
  }
  .close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
  }
  .output-body {
    padding: 16px 20px;
  }
  .output-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--accent2);
    margin: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }
  .output-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }
  .output-item-name { color: var(--text); }
  .output-item-qty {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-weight: 500;
  }
  .output-item-prod {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #555566;
    margin-top: 1px;
  }
  .output-notes {
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px 12px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }
</style>
</head>

// ── RENDER FORM ────────────────────────────────────────────────────────────
const container = document.getElementById('formSections');
let totalItems = 0;
let customItems = [];

sections.forEach((section, si) => {
  const sEl = document.createElement('div');
  sEl.className = 'section';
  sEl.dataset.section = si;

  sEl.innerHTML = `
    <div class="section-header" onclick="toggleSection(${si})">
      <div>
        <div class="section-title">${section.name}</div>
        <div class="section-meta">${section.items.length} items</div>
      </div>
      <div class="section-toggle">▾</div>
    </div>
    <div class="section-body" id="body-${si}"></div>
  `;

  const body = sEl.querySelector(`#body-${si}`);

  section.items.forEach((item, ii) => {
    totalItems++;
    const row = document.createElement('div');
    row.className = 'item-row';
    row.dataset.si = si;
    row.dataset.ii = ii;
    row.innerHTML = `
      <div>
        <div class="item-name">${item.name} <span style="font-size:9px;font-family:'DM Mono',monospace;padding:2px 5px;border-radius:3px;margin-left:4px;background:${item.vendor==='PFG'?'rgba(245,166,35,0.15)':'rgba(233,69,96,0.12)'};color:${item.vendor==='PFG'?'#f5a623':'#e94560'}">${item.vendor}</span></div>
        <div class="item-par">Order point: <span>${item.par}</span> &nbsp;·&nbsp; ${item.pack}</div>
        <div class="item-prod">#${item.prod}</div>
      </div>
      <input type="number" class="count-input" placeholder="Count" min="0" step="0.5"
        data-si="${si}" data-ii="${ii}" data-par="${item.par}" data-unit="${item.unit}"
        oninput="handleCount(this)" inputmode="decimal">
      <div class="item-controls">
        <div class="status-dot" id="dot-${si}-${ii}"></div>
        <select class="unit-select" id="unit-${si}-${ii}">
          ${['LB','CT','CS','GA','BT','CN','EA','RL','BX'].map(u =>
            `<option value="${u}" ${u===item.unit?'selected':''}>${u}</option>`
          ).join('')}
        </select>
      </div>
    `;
    body.appendChild(row);
  });

  // Add item row
  const addRow = document.createElement('div');
  addRow.className = 'add-item-row';
  addRow.innerHTML = `
    <button class="add-item-btn" onclick="showAddForm(${si})">+ Add item not on list</button>
    <div class="custom-item-form" id="custom-form-${si}">
      <input class="custom-input" id="custom-name-${si}" placeholder="Item name / description" type="text">
      <div class="custom-row">
        <input class="custom-input" id="custom-qty-${si}" placeholder="Qty needed" type="text">
        <input class="custom-input" id="custom-prod-${si}" placeholder="Prod # (optional)" type="text">
      </div>
      <div class="custom-btns">
        <button class="cancel-custom-btn" onclick="hideAddForm(${si})">Cancel</button>
        <button class="save-custom-btn" onclick="saveCustomItem(${si})">Add to Order</button>
      </div>
    </div>
  `;
  body.appendChild(addRow);
  container.appendChild(sEl);
});

// ── LOGIC ──────────────────────────────────────────────────────────────────
let counted = 0;
let toOrder = 0;

function parseVal(str) {
  const n = parseFloat(str);
  return isNaN(n) ? null : n;
}

function parseParVal(par) {
  return parseFloat(par) || 0;
}

function handleCount(input) {
  const si = input.dataset.si;
  const ii = input.dataset.ii;
  const dot = document.getElementById(`dot-${si}-${ii}`);
  const row = input.closest('.item-row');
  const val = parseVal(input.value);
  const par = parseParVal(input.dataset.par);

  input.classList.remove('needs-order','ok');
  dot.classList.remove('needs-order','ok');
  row.classList.remove('flagged','ok');

  if (val !== null) {
    if (val <= par) {
      input.classList.add('needs-order');
      dot.classList.add('needs-order');
      row.classList.add('flagged');
    } else {
      input.classList.add('ok');
      dot.classList.add('ok');
      row.classList.add('ok');
    }
  }
  updateSummary();
}

function updateSummary() {
  const inputs = document.querySelectorAll('.count-input');
  let c = 0, o = 0;
  inputs.forEach(inp => {
    if (inp.value !== '') {
      c++;
      if (parseVal(inp.value) <= parseParVal(inp.dataset.par)) o++;
    }
  });
  counted = c;
  toOrder = o + customItems.filter(i => i.active).length;
  document.getElementById('orderCount').textContent = toOrder;
  document.getElementById('progressBar').style.width = `${Math.round(c/totalItems*100)}%`;
  document.getElementById('progressLabel').textContent = `${c} of ${totalItems} items counted`;
}

function toggleSection(si) {
  const el = document.querySelector(`.section[data-section="${si}"]`);
  el.classList.toggle('collapsed');
}

function showAddForm(si) {
  document.getElementById(`custom-form-${si}`).classList.add('visible');
}
function hideAddForm(si) {
  document.getElementById(`custom-form-${si}`).classList.remove('visible');
  document.getElementById(`custom-name-${si}`).value = '';
  document.getElementById(`custom-qty-${si}`).value = '';
  document.getElementById(`custom-prod-${si}`).value = '';
}
function saveCustomItem(si) {
  const name = document.getElementById(`custom-name-${si}`).value.trim();
  const qty = document.getElementById(`custom-qty-${si}`).value.trim();
  const prod = document.getElementById(`custom-prod-${si}`).value.trim();
  if (!name || !qty) return;
  customItems.push({ si, name, qty, prod, active: true, sectionName: sections[si].name });
  hideAddForm(si);

  // Show confirmation in section
  const body = document.getElementById(`body-${si}`);
  const tag = document.createElement('div');
  tag.className = 'item-row flagged';
  tag.style.opacity = '0.85';
  tag.innerHTML = `
    <div><div class="item-name">✦ ${name}</div><div class="item-par">Custom add · ${prod||'no prod #'}</div></div>
    <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent2);text-align:center;">${qty}</div>
    <div></div>
  `;
  body.insertBefore(tag, body.lastElementChild);
  updateSummary();
}

function compileOrder() {
  const inputs = document.querySelectorAll('.count-input');
  const orderBySec = {};

  // Split items by vendor
  const usfItems = {};
  const pfgItems = {};

  inputs.forEach(inp => {
    if (inp.value === '') return;
    const val = parseVal(inp.value);
    const par = parseParVal(inp.dataset.par);
    if (val > par) return;
    const si = inp.dataset.si;
    const ii = inp.dataset.ii;
    const item = sections[si].items[ii];
    const unit = document.getElementById(`unit-${si}-${ii}`).value;
    const sName = sections[si].name;
    const bucket = item.vendor === 'PFG' ? pfgItems : usfItems;
    if (!bucket[sName]) bucket[sName] = [];
    bucket[sName].push({ name: item.name, prod: item.prod, pack: item.pack, count: val, unit });
  });

  customItems.filter(i => i.active).forEach(ci => {
    if (!usfItems[ci.sectionName]) usfItems[ci.sectionName] = [];
    usfItems[ci.sectionName].push({ name: `★ ${ci.name}`, prod: ci.prod||'—', pack: '—', count: ci.qty, unit: '' });
  });

  const notes = document.getElementById('globalNotes').value.trim();
  const body = document.getElementById('outputBody');
  const dateLine = document.getElementById('dateLine').textContent;
  let plain = '';

  body.innerHTML = '';
  const totalOrders = Object.keys(usfItems).length + Object.keys(pfgItems).length;

  if (totalOrders === 0) {
    body.innerHTML = '<div style="color:var(--green);text-align:center;padding:20px;font-size:14px;">✓ All items are stocked above par. Nothing to order!</div>';
  } else {
    const renderVendor = (vendorName, vendorColor, buckets) => {
      if (Object.keys(buckets).length === 0) return;
      const vendorHeader = document.createElement('div');
      vendorHeader.style.cssText = `background:${vendorColor};color:white;padding:8px 12px;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin:16px 0 8px`;
      vendorHeader.textContent = `── ${vendorName} ──`;
      body.appendChild(vendorHeader);
      plain += `\n${'='.repeat(40)}\n${vendorName.toUpperCase()}\n${'='.repeat(40)}\n`;

      Object.entries(buckets).forEach(([sec, items]) => {
        const secTitle = document.createElement('div');
        secTitle.className = 'output-section-title';
        secTitle.textContent = sec;
        body.appendChild(secTitle);
        plain += `\n${sec.toUpperCase()}\n`;
        items.forEach(item => {
          const row = document.createElement('div');
          row.className = 'output-item';
          row.innerHTML = `
            <div>
              <div class="output-item-name">${item.name}</div>
              <div class="output-item-prod">#${item.prod} · ${item.pack}</div>
            </div>
            <div class="output-item-qty">${item.count} ${item.unit}</div>
          `;
          body.appendChild(row);
          plain += `  ${item.name} — ${item.count} ${item.unit} (#${item.prod})\n`;
        });
      });
    };

    plain = `SWIFT LOUNGE — ORDER SHEET\n${dateLine}\n`;
    renderVendor('US Foods', '#e94560', usfItems);
    renderVendor('Performance Food Group', '#f5a623', pfgItems);
  }

  if (notes) {
    const nEl = document.createElement('div');
    nEl.className = 'output-notes';
    nEl.innerHTML = `<strong style="color:var(--accent2)">Notes:</strong> ${notes}`;
    body.appendChild(nEl);
    plain += `NOTES: ${notes}\n`;
  }

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = 'Copy Order to Clipboard';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(plain).then(() => {
      copyBtn.textContent = '✓ Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy Order to Clipboard'; copyBtn.classList.remove('copied'); }, 2000);
    });
  };
  body.appendChild(copyBtn);

  document.getElementById('outputModal').classList.add('visible');
}

function closeModal() {
  document.getElementById('outputModal').classList.remove('visible');
}
</script>
